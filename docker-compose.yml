###############################################################################
# Football Field Intelligence System — Docker Compose Dev Environment
###############################################################################
#
# Services
#   frontend  — React 18 + Vite SPA           → http://localhost:5173
#   backend   — Laravel 12 PHP 8.4 (php-fpm)
#   nginx     — Reverse proxy                  → http://localhost:80
#   mariadb   — MariaDB 11                     → localhost:3306
#   redis     — Redis 7                        → localhost:6379
#   minio     — Object storage                 → http://localhost:9000 (API)
#                                              → http://localhost:9001 (Console)
#   horizon   — Laravel queue worker (Horizon)
#   mailpit   — Local mail catcher             → http://localhost:8025
#
###############################################################################

services:

  # ─── Frontend ─────────────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: ffis_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost/api
      - VITE_APP_ENV=development
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - ffis

  # ─── Backend (PHP-FPM) ────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ffis_backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ffis}
      - DB_USERNAME=${DB_USERNAME:-ffis}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - FILESYSTEM_DISK=minio
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ffis_minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ffis_minio_secret}
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=${MINIO_BUCKET:-ffis-media}
      - AWS_ENDPOINT=http://minio:9000
      - AWS_URL=http://localhost:9000/${MINIO_BUCKET:-ffis-media}
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=claude-sonnet-4-20250514
      - SANCTUM_STATEFUL_DOMAINS=localhost:5173,localhost
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ffis

  # ─── Nginx ────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: ffis_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
    depends_on:
      - backend
      - frontend
    networks:
      - ffis

  # ─── MariaDB ──────────────────────────────────────────────────────────────

  mariadb:
    image: mariadb:11
    container_name: ffis_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MARIADB_DATABASE: ${DB_DATABASE:-ffis}
      MARIADB_USER: ${DB_USERNAME:-ffis}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ffis

  # ─── Redis ────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: ffis_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ffis

  # ─── MinIO ────────────────────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: ffis_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ffis_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ffis_minio_secret}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ffis

  # MinIO bucket initializer — runs once then exits
  minio_init:
    image: minio/mc:latest
    container_name: ffis_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-ffis_minio} ${MINIO_ROOT_PASSWORD:-ffis_minio_secret};
        mc mb --ignore-existing local/${MINIO_BUCKET:-ffis-media};
        mc anonymous set download local/${MINIO_BUCKET:-ffis-media};
        echo 'MinIO bucket ready.';
      "
    networks:
      - ffis

  # ─── Laravel Horizon (Queue Worker) ───────────────────────────────────────

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ffis_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=mariadb
      - DB_DATABASE=${DB_DATABASE:-ffis}
      - DB_USERNAME=${DB_USERNAME:-ffis}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret}
      - QUEUE_CONNECTION=redis
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - backend
      - redis
    networks:
      - ffis

  # ─── Mailpit (Local Mail Catcher) ─────────────────────────────────────────

  mailpit:
    image: axllent/mailpit:latest
    container_name: ffis_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - ffis

###############################################################################
# Volumes
###############################################################################

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

###############################################################################
# Networks
###############################################################################

networks:
  ffis:
    driver: bridge
