; FFIS — PHP dev configuration

[PHP]
display_errors         = On
display_startup_errors = On
error_reporting        = E_ALL
log_errors             = On
memory_limit           = 512M
max_execution_time     = 120
upload_max_filesize    = 64M
post_max_size          = 64M

[opcache]
opcache.enable         = 1
opcache.revalidate_freq= 0      ; always revalidate in dev
opcache.validate_timestamps = 1
