###############################################################################
# FFIS — Nginx Dev Reverse Proxy
#
# Routing:
#   /api/*         → Laravel (php-fpm via backend:9000)
#   /sanctum/*     → Laravel (Sanctum CSRF cookie endpoint)
#   /up            → Laravel health check
#   /*             → Vite dev server (frontend:5173)
###############################################################################

server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    # ── Vite HMR WebSocket passthrough ──────────────────────────────────────
    location /__vite_hmr {
        proxy_pass         http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # ── Laravel API + Sanctum + Health ────────────────────────────────────
    location ~ ^/(api|sanctum|up)(/|$) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM processing ────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass           backend:9000;
        fastcgi_index          index.php;
        fastcgi_param          SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include                fastcgi_params;
        fastcgi_read_timeout   120;
    }

    # ── Laravel static assets (storage, etc.) ───────────────────────────
    location /storage/ {
        try_files $uri $uri/ =404;
    }

    # ── All other traffic → Vite dev server ─────────────────────────────
    location / {
        proxy_pass         http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # ── Logging ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/ffis_access.log;
    error_log  /var/log/nginx/ffis_error.log;
}
